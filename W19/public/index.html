<!DOCTYPE html>
<html>
<head>
<title>Students</title>
<style>
  table { border-collapse: collapse; margin: 20px; }
  th, td { border: 1px solid #333; padding: 8px; }
</style>
</head>
<body>
<h2>Student List</h2>
<p>Total: <span id="count"></span></p>
<table>
  <tr>
    <th>Name</th><th>Roll No</th>
    <th>WAD</th><th>DSBDA</th><th>CNS</th><th>CC</th><th>AI</th>
  </tr>
  <tbody id="rows"></tbody>
</table>

<script>
fetch("/all")
  .then(res => res.json())
  .then(data => {
    document.getElementById("count").innerText = data.length;
    let html = "";
    data.forEach(s => {
      html += `<tr>
        <td>${s.name}</td>
        <td>${s.roll_no}</td>
        <td>${s.WAD}</td>
        <td>${s.DSBDA}</td>
        <td>${s.CNS}</td>
        <td>${s.CC}</td>
        <td>${s.AI}</td>
      </tr>`;
    });
    document.getElementById("rows").innerHTML = html;
  });
</script>
</body>
</html>
