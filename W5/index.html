<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mugs Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container-fluid mt-3">

    <!-- Top Bar -->
    <div class="d-flex justify-content-between align-items-center mb-3 px-3">
        <h2>Mugs</h2>

        <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                Sort by: Popularity
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Price</a></li>
                <li><a class="dropdown-item" href="#">Rating</a></li>
            </ul>
        </div>
    </div>

    <div class="row">

        <!-- LEFT SIDEBAR -->
        <div class="col-md-3 bg-white p-3">

            <h6>Target Market</h6>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> USA
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> Canada
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> Europe
            </div>

            <hr>

            <h6>Print Area</h6>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> All areas
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> Front
            </div>

            <hr>

            <h6>Providers</h6>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> ArtsAdd
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox"> Colorway
            </div>

        </div>

        <!-- PRODUCT GRID -->
        <div class="col-md-9">

            <div class="row g-3">

                <!-- PRODUCT CARD -->
                <div class="col-md-3 col-sm-6">
                    <div class="card h-100">
                        <img src="images/mug1.jpg" class="card-img-top">
                        <div class="card-body">
                            <h6>Ceramic Mug</h6>
                            <p class="text-muted small">Generic Brand</p>
                            <p class="fw-bold text-success">₹449</p>
                        </div>
                    </div>
                </div>

                <!-- PRODUCT CARD -->
                <div class="col-md-3 col-sm-6">
                    <div class="card h-100">
                        <img src="images/mug2.jpg" class="card-img-top">
                        <div class="card-body">
                            <h6>Accent Mug</h6>
                            <p class="text-muted small">Generic Brand</p>
                            <p class="fw-bold text-success">₹549</p>
                        </div>
                    </div>
                </div>

                <!-- PRODUCT CARD -->
                <div class="col-md-3 col-sm-6">
                    <div class="card h-100">
                        <img src="images/mug3.jpg" class="card-img-top">
                        <div class="card-body">
                            <h6>Black Mug</h6>
                            <p class="text-muted small">Premium</p>
                            <p class="fw-bold text-success">₹599</p>
                        </div>
                    </div>
                </div>

                <!-- ADD MORE SAME WAY -->

            </div>

        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
