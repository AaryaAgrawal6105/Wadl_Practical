<!DOCTYPE html>
<html>
<head>
    <title>Registration System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button id="loginTab" class="active" onclick="showForm('login')">Login</button>
            <button id="registerTab" onclick="showForm('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <h2>Login</h2>
            <input type="text" id="loginUser" placeholder="Username" required><br><br>
            <input type="password" id="loginPass" placeholder="Password" required><br><br>
            <button type="submit" class="main-btn">Login</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
            <h2>Register</h2>
            <input type="text" id="regName" placeholder="Name" required><br><br>
            <input type="email" id="regEmail" placeholder="Email" required><br><br>
            <input type="number" id="regMobile" placeholder="Mobile" required><br><br>
            <input type="date" id="regDob" required><br><br>
            <input type="text" id="regCity" placeholder="City" required><br><br>
            <textarea id="regAddress" placeholder="Address" required></textarea><br><br>
            <button type="submit" class="main-btn">Register</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
