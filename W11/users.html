<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="padding: 40px 0;">
    <div class="users-container" style="margin: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2>Registered Users</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="clearData()" class="main-btn" style="width: auto; margin: 0; padding: 8px 20px; background: #dc3545;">Clear All</button>
                <button onclick="window.location.href='index.html'" class="main-btn" style="width: auto; margin: 0; padding: 8px 20px;">Add New</button>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>DOB</th>
                    <th>City</th>
                    <th>Address</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
