<div class="form-card">
  <h2>Profile</h2>
  @if (user(); as u) {
    <div class="info">
      <p><strong>Full Name:</strong> {{ u.fullName }}</p>
      <p><strong>Username:</strong> {{ u.username }}</p>
      <p><strong>Email:</strong> {{ u.email }}</p>
    </div>
    <button (click)="logout()">Logout</button>
  } @else {
    <p>You are not logged in. <a routerLink="/login">Go to login</a></p>
  }
</div>
